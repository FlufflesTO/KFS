<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Urgent amber theme ring -->
  <circle cx="40" cy="40" r="38" stroke="#F59E0B" stroke-width="2.5" fill="#0B1520"/>
  <circle cx="40" cy="40" r="34" stroke="#FBBF24" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Diagonal Wrench (Spanner) -->
  <path d="M22 58 L52 28" stroke="#4B2E83" stroke-width="5" stroke-linecap="round"/>
  <!-- Wrench head bottom-left -->
  <circle cx="22" cy="58" r="7" fill="#0B1520" stroke="#4B2E83" stroke-width="3"/>
  <path d="M17 63 L27 53" stroke="#0B1520" stroke-width="3"/>
  <!-- Wrench head top-right -->
  <circle cx="52" cy="28" r="7" fill="#0B1520" stroke="#4B2E83" stroke-width="3"/>
  <path d="M47 33 L57 23" stroke="#0B1520" stroke-width="3"/>
  <!-- Clock overlay in center-right -->
  <circle cx="44" cy="44" r="16" fill="#15191D" stroke="#00C2FF" stroke-width="2.5"/>
  <!-- Clock hands -->
  <line x1="44" y1="44" x2="44" y2="34" stroke="#00C2FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="44" x2="52" y2="44" stroke="#00C2FF" stroke-width="2" stroke-linecap="round"/>
  <!-- Alarm indicator dot -->
  <circle cx="44" cy="44" r="1.5" fill="#F59E0B"/>
</svg>
