<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Planned purple theme ring -->
  <circle cx="40" cy="40" r="38" stroke="#4B2E83" stroke-width="2.5" fill="#0B1520"/>
  <circle cx="40" cy="40" r="34" stroke="#00C2FF" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Calendar box -->
  <rect x="25" y="24" width="30" height="32" rx="3" stroke="#1F4E79" stroke-width="2.5" fill="#15191D"/>
  <!-- Binder hooks -->
  <line x1="32" y1="20" x2="32" y2="26" stroke="#00C2FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="20" x2="48" y2="26" stroke="#00C2FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Header bar inside calendar -->
  <line x1="25" y1="34" x2="55" y2="34" stroke="#1F4E79" stroke-width="1.5"/>
  <!-- Grid representation -->
  <circle cx="32" cy="42" r="1.5" fill="#00C2FF" opacity="0.6"/>
  <circle cx="40" cy="42" r="1.5" fill="#00C2FF" opacity="0.6"/>
  <circle cx="48" cy="42" r="1.5" fill="#00C2FF" opacity="0.6"/>
  <circle cx="32" cy="49" r="1.5" fill="#00C2FF" opacity="0.6"/>
  <circle cx="40" cy="49" r="1.5" fill="#00C2FF" opacity="0.6"/>
  <!-- Large checkmark overlay representing scheduled/done status -->
  <path d="M44 48 L49 53 L58 42" stroke="#16A34A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
