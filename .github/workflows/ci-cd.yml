name: Kharon Portal CI/CD

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (>=22.12.0)
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        
      - name: Build Application
        run: npm run build
        env:
          PUBLIC_SITE_URL: ${{ github.ref == 'refs/heads/main' && 'https://www.kharon.co.za' || 'https://www.tequit.co.za' }}
          PUBLIC_PORTAL_URL: ${{ github.ref == 'refs/heads/main' && 'https://portal.kharon.co.za' || 'https://portal.tequit.co.za' }}

      - name: Site Audit (Security & Performance)
        run: npm run audit:site

      - name: Deploy to Cloudflare Pages
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging') && github.event_name == 'push'
        run: npx wrangler pages deploy dist --project-name kharon-website --branch ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}