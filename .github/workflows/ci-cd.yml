name: Kharon Portal CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --max-old-space-size=4096
      PUBLIC_SITE_URL: https://www.tequit.co.za
      PUBLIC_PORTAL_URL: https://portal.tequit.co.za
      PUBLIC_CONTACT_EMAIL: admin@kharon.co.za
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CSRF_SECRET: ${{ secrets.CSRF_SECRET }}
      MFA_SECRET: ${{ secrets.MFA_SECRET }}
      ENCRYPTION_SECRET: ${{ secrets.ENCRYPTION_SECRET }}
      SAGE_WEBHOOK_SECRET: ${{ secrets.SAGE_WEBHOOK_SECRET }}
    steps:
      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https software-properties-common
          wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb"
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (>=22.12.0)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Prepare CI Local Secrets
        run: |
          add_secret() {
            name="$1"
            value="$2"
            if [ -z "${!name}" ]; then
              echo "$name=$value" >> "$GITHUB_ENV"
            fi
          }
          suffix="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-0123456789abcdef"
          add_secret SESSION_SECRET "ci-session-secret-${suffix}"
          add_secret CSRF_SECRET "ci-csrf-secret-${suffix}"
          add_secret MFA_SECRET "ci-mfa-secret-${suffix}"
          add_secret ENCRYPTION_SECRET "ci-encryption-secret-${suffix}"
          add_secret AUTH_SECRET "ci-auth-secret-${suffix}"
          add_secret FINGERPRINT_SECRET "ci-fingerprint-secret-${suffix}"
          add_secret AUDIT_IP_SALT "ci-audit-ip-salt-${suffix}"
          add_secret SAGE_WEBHOOK_SECRET "ci-sage-webhook-secret-${suffix}"

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run check

      - name: Build Deployment Artifacts
        run: npm run build:production

      - name: Site Audit (Security & Performance)
        run: npm run audit:site

      - name: Dependency Audit
        run: npm audit --omit=dev

      - name: Install Playwright Browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run E2E Tests
        run: |
          npx wrangler d1 migrations apply kharon-portal --local --config wrangler.portal.jsonc
          npm run build:portal
          npm test
        env:
          NODE_ENV: test

      - name: D1 Migration Ledger Preflight
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx tsx scripts/d1-migration-preflight.ts DB
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: D1 Remote Schema Preflight
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx tsx scripts/d1-schema-smoke.ts DB
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Backup D1 Before Migration
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p backups
          npx wrangler d1 export DB --remote --output "backups/d1-pre-migration-${{ github.run_id }}.sql" --skip-confirmation --config wrangler.portal.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload Backup Artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: d1-pre-migration-backup-${{ github.run_id }}
          path: backups/d1-pre-migration-${{ github.run_id }}.sql
          retention-days: 30

      - name: Apply D1 Database Migrations
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx wrangler d1 migrations apply DB --remote --config wrangler.portal.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: D1 Post-Migration Smoke
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx tsx scripts/d1-schema-smoke.ts DB --post
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Portal to Cloudflare
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx wrangler deploy --config .deploy/portal/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Website to Cloudflare
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx wrangler pages deploy .deploy/website --project-name kfs-website --branch ${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
